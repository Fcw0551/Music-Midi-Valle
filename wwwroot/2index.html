<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音乐登录界面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f5f7fa;
            background-image:
                linear-gradient(to bottom, #e0e6ed 1px, transparent 1px),
                linear-gradient(to bottom, #e0e6ed 1px, transparent 1px);
            background-size: 100% 40px;
            background-position: 0 20px, 0 60px;
            position: relative;
        }

        body::before, body::after {
            content: "♪";
            position: absolute;
            font-size: 36px;
            color: #8899a6;
            opacity: 0.3;
        }
        body::before {
            top: 15%;
            left: 10%;
        }
        body::after {
            bottom: 20%;
            right: 12%;
            content: "♫";
        }

        .login-card {
            width: 380px;
            padding: 40px 30px;
            background: white;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
            z-index: 1;
        }

        .login-title {
            text-align: center;
            font-size: 24px;
            color: #333;
            margin-bottom: 35px;
            position: relative;
        }
        .login-title::after {
            content: "";
            width: 40px;
            height: 2px;
            background: #5b7bd5;
            display: block;
            margin: 10px auto 0;
        }

        .input-group {
            margin-bottom: 20px;
        }
        .input-label {
            display: block;
            font-size: 14px;
            color: #666;
            margin-bottom: 8px;
        }
        .input-box {
            width: 100%;
            height: 45px;
            padding: 0 15px;
            border: 1px solid #ddd;
            border-radius: 6px;
            font-size: 15px;
            outline: none;
            transition: border 0.3s;
        }
        .input-box:focus {
            border-color: #5b7bd5;
        }

        .login-btn {
            width: 100%;
            height: 48px;
            background-color: #5b7bd5;
            color: white;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s;
            margin-bottom: 10px;
        }
        .login-btn:hover {
            background-color: #4a69c0;
        }

        .reg-btn {
            width: 100%;
            height: 48px;
            background-color: #fff;
            color: #5b7bd5;
            border: 1px solid #5b7bd5;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }
        .reg-btn:hover {
            background-color: #f0f4ff;
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.5);
            justify-content: center;
            align-items: center;
            z-index: 999;
        }
        .modal-content {
            width: 380px;
            padding: 30px;
            background: white;
            border-radius: 12px;
        }
        .modal-title {
            text-align: center;
            font-size: 20px;
            margin-bottom: 25px;
        }
        .close-btn {
            float: right;
            font-size: 24px;
            cursor: pointer;
            color: #999;
        }
    </style>
</head>

<body>
    <div class="login-card">
        <h2 class="login-title">用户登录</h2>

        <div class="input-group">
            <label class="input-label">用户名</label>
            <input type="text" id="username" class="input-box" placeholder="请输入用户名">
        </div>

        <div class="input-group">
            <label class="input-label">密码</label>
            <input type="password" id="password" class="input-box" placeholder="请输入密码">
        </div>

        <button class="login-btn" onclick="login()">登录</button>
        <button class="reg-btn" onclick="openRegisterModal()">注册</button>
    </div>

    <div id="register-modal" class="modal">
        <div class="modal-content">
            <span class="close-btn" onclick="closeRegisterModal()">×</span>
            <h3 class="modal-title">用户注册</h3>
            <div class="input-group">
                <label class="input-label">用户名</label>
                <input type="text" id="reg-username" class="input-box" placeholder="请输入用户名">
            </div>
            <div class="input-group">
                <label class="input-label">密码</label>
                <input type="password" id="reg-password" class="input-box" placeholder="请输入密码">
            </div>
            <button class="login-btn" onclick="doRegister()">确认注册</button>
        </div>
    </div>

    <script>
        // 打开/关闭注册弹窗
        function openRegisterModal() {
            document.getElementById('register-modal').style.display = 'flex';
            document.getElementById('reg-username').value = '';
            document.getElementById('reg-password').value = '';
        }
        function closeRegisterModal() {
            document.getElementById('register-modal').style.display = 'none';
        }

        // 登录
        function login() {
            const username = document.getElementById('username').value.trim();
            const password = document.getElementById('password').value.trim();

            if (!username || !password) {
                alert('请输入用户名和密码');
                return;
            }

            fetch('/api/login', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            })
            .then(res => res.json())
            .then(data => {
                if (data.code === 0) {
                    localStorage.setItem('token', data.data.token);
                    localStorage.setItem('username', data.data.username);
                    localStorage.setItem('role', data.data.role);
                    alert('登录成功');
                    // 根据角色跳转不同页面
                    if (data.data.role === 'super_admin') {
                        location.href = 'admin.html';
                    } else {
                        location.href = 'main.html';
                    }
                } else {
                    alert('登录失败：' + data.message);
                }
            })
            .catch(err => {
                alert('网络异常');
            });
        }

        // 注册
        function doRegister() {
            const username = document.getElementById('reg-username').value.trim();
            const password = document.getElementById('reg-password').value.trim();

            if (!username || !password) {
                alert('请输入用户名和密码');
                return;
            }

            fetch('/api/register', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ username, password })
            })
            .then(res => res.json())
            .then(data => {
                if (data.code === 0) {
                    alert('注册成功，请登录');
                    closeRegisterModal();
                } else {
                    alert('注册失败：' + data.message);
                }
            })
            .catch(err => {
                alert('网络异常');
            });
        }

        // 键盘快捷键
        document.getElementById('username').addEventListener('keydown', e => {
            if (e.key === 'Enter') document.getElementById('password').focus();
        });
        document.getElementById('password').addEventListener('keydown', e => {
            if (e.key === 'Enter') login();
        });
    </script>
</body>
</html>
