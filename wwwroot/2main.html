<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>霓虹乐章 · AI 音乐生成</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
            background: radial-gradient(circle at 20% 30%, #1a2a4a, #03050b);
            min-height: 100vh;
            color: #f0f3fa;
            padding: 2rem;
            line-height: 1.5;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
            padding: 1rem 2rem;
            background: rgba(15, 25, 45, 0.4);
            backdrop-filter: blur(15px);
            border-radius: 60px;
            border: 1px solid rgba(120, 180, 255, 0.2);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo-icon {
            width: 48px;
            height: 48px;
            background: linear-gradient(145deg, #a5f3fc, #c084fc);
            border-radius: 16px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 26px;
            box-shadow: 0 0 20px #a5f3fc66;
        }

        .logo h1 {
            font-size: 1.9rem;
            font-weight: 700;
            background: linear-gradient(135deg, #ffffff, #c4b5fd);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
        }

        .user-area {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(255, 255, 255, 0.03);
            padding: 6px 18px 6px 12px;
            border-radius: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: linear-gradient(145deg, #7c9bda, #4f6f9f);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.2rem;
            color: white;
            text-transform: uppercase;
            box-shadow: 0 0 15px #4f6f9f;
            border: 2px solid rgba(255, 255, 255, 0.2);
        }

        .user-text {
            display: flex;
            flex-direction: column;
        }

        .user-name {
            font-weight: 600;
            color: #f0f3fa;
            line-height: 1.2;
        }

        .user-role {
            font-size: 0.75rem;
            opacity: 0.7;
        }

        .logout-btn {
            background: rgba(220, 38, 38, 0.15);
            border: 1px solid rgba(220, 38, 38, 0.4);
            padding: 0.6rem 1.4rem;
            border-radius: 30px;
            color: #ffb3b3;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            backdrop-filter: blur(5px);
            font-size: 0.9rem;
        }

        .logout-btn:hover {
            background: #b91c1c;
            color: white;
            border-color: #b91c1c;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(220, 38, 38, 0.4);
        }

        .two-columns {
            display: grid;
            grid-template-columns: 1fr 1.8fr;
            gap: 2rem;
        }

        .card {
            background: rgba(18, 28, 46, 0.6);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 1.8rem;
            margin-bottom: 2rem;
            box-shadow: 0 20px 40px -10px rgba(0, 0, 0, 0.5), 0 0 0 1px rgba(120, 180, 255, 0.1) inset;
            border: 1px solid rgba(255, 255, 255, 0.03);
            transition: transform 0.2s ease, box-shadow 0.2s;
        }

        .card:hover {
            box-shadow: 0 25px 50px -12px #000000, 0 0 0 1px #7aaaff33 inset;
        }

        .card-title {
            font-size: 1.4rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            color: #c6dcff;
            font-weight: 600;
            letter-spacing: -0.3px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            padding-bottom: 0.8rem;
        }

        .profile-card {
            background: linear-gradient(145deg, rgba(30, 40, 60, 0.7), rgba(15, 25, 40, 0.8));
            border: 1px solid rgba(200, 180, 255, 0.15);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin: 1.5rem 0;
        }

        .stat-item {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 20px;
            padding: 1rem 0.5rem;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: #b6d9ff;
        }

        .stat-label {
            font-size: 0.8rem;
            opacity: 0.8;
            margin-top: 0.2rem;
        }

        .file-input {
            margin-bottom: 1.5rem;
        }

        .file-input label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #b0c8e5;
            font-size: 0.95rem;
        }

        input[type="file"] {
            width: 100%;
            padding: 0.9rem 1rem;
            background: rgba(10, 20, 35, 0.6);
            border: 1.5px dashed #4a5f7a;
            border-radius: 20px;
            color: #dfe7f5;
            cursor: pointer;
            transition: all 0.2s;
            font-size: 0.9rem;
        }

        input[type="file"]:hover {
            border-color: #8aa2cc;
            background: rgba(20, 35, 55, 0.8);
        }

        input[type="file"]::file-selector-button {
            background: linear-gradient(145deg, #4f6f9f, #2e4a7a);
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 30px;
            color: white;
            font-weight: 500;
            cursor: pointer;
            margin-right: 1.2rem;
            transition: 0.15s;
            border: 1px solid #8aabee33;
        }

        .btn-generate {
            background: linear-gradient(145deg, #9b6dff, #6d28d9);
            color: white;
            border: none;
            padding: 1rem 1.8rem;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
            transition: all 0.2s;
            margin-top: 0.8rem;
            box-shadow: 0 8px 20px -8px #8b5cf6;
            border: 1px solid #c4b5fd55;
            letter-spacing: 0.5px;
        }

        .btn-generate:hover {
            background: linear-gradient(145deg, #b08eff, #7c3aed);
            transform: translateY(-2px);
            box-shadow: 0 15px 25px -8px #a78bfa;
        }

        .btn-generate:disabled {
            background: #334155;
            box-shadow: none;
            transform: none;
            opacity: 0.6;
        }

        .result-area {
            background: rgba(0, 0, 0, 0.2);
            border-radius: 24px;
            padding: 1.2rem;
            margin-top: 1.8rem;
            text-align: center;
            backdrop-filter: blur(8px);
            border: 1px solid #3f4e6b;
        }

        .loading {
            display: inline-block;
            width: 22px;
            height: 22px;
            border: 3px solid #a5b4cb;
            border-top-color: #c084fc;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin-right: 0.6rem;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        audio {
            width: 100%;
            margin: 1rem 0 0.5rem;
            border-radius: 30px;
            background: #0f1a2b;
        }

        .download-link {
            display: inline-block;
            background: #3b82f6;
            color: white;
            padding: 0.6rem 1.4rem;
            border-radius: 40px;
            text-decoration: none;
            margin-top: 0.8rem;
            font-weight: 500;
            transition: background 0.2s;
        }

        .error-message {
            color: #fca5a5;
            background: #2d1a1e;
            padding: 0.9rem;
            border-radius: 20px;
            border-left: 5px solid #f87171;
        }

        .history-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
        }

        .history-table th {
            text-align: left;
            padding: 1rem 0.5rem 0.8rem 0.5rem;
            color: #a5d8ff;
            font-weight: 600;
            border-bottom: 2px solid #2e405b;
        }

        .history-table td {
            padding: 0.9rem 0.5rem;
            border-bottom: 1px solid #25344a;
            color: #d6e3f5;
        }

        .history-audio audio {
            width: 140px;
            height: 32px;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-top: 2rem;
        }

        .page-btn {
            background: #1e2e45;
            border: 1px solid #4b6382;
            padding: 0.5rem 1.2rem;
            border-radius: 30px;
            color: #e0edff;
            font-weight: 500;
            cursor: pointer;
            transition: 0.15s;
        }

        .badge {
            background: #2e3f5e;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            font-size: 0.8rem;
            color: #bdd3ff;
        }

        @media (max-width: 900px) {
            .two-columns {
                grid-template-columns: 1fr;
            }
            body {
                padding: 1rem;
            }
            .header {
                flex-direction: column;
                align-items: stretch;
                gap: 1rem;
            }
            .user-area {
                justify-content: space-between;
            }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">
            <div class="logo-icon">🎵</div>
            <h1>霓虹乐章</h1>
        </div>
        <div class="user-area">
            <div class="user-profile" id="userProfile">
                <div class="avatar" id="userAvatar">U</div>
                <div class="user-text">
                    <span class="user-name" id="usernameDisplay">音乐家</span>
                    <span class="user-role" id="userRoleDisplay">创作者</span>
                </div>
            </div>
            <button class="logout-btn" id="logoutBtn">🚪 退出</button>
        </div>
    </div>

    <div class="two-columns">
        <div>
            <div class="card profile-card">
                <div class="card-title"><span>🎧</span> 我的工作室</div>
                <div class="stats-grid">
                    <div class="stat-item">
                        <div class="stat-value" id="totalTasks">0</div>
                        <div class="stat-label">总作品</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="processingTasks">0</div>
                        <div class="stat-label">进行中</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="completedTasks">0</div>
                        <div class="stat-label">已完成</div>
                    </div>
                    <div class="stat-item">
                        <div class="stat-value" id="failedTasks">0</div>
                        <div class="stat-label">失败</div>
                    </div>
                </div>
                <div style="font-size:0.9rem; opacity:0.7; margin-top:0.5rem;">
                    <span>✨ 创作灵感，一键生成</span>
                </div>
            </div>

            <div class="card">
                <div class="card-title"><span>🖼️</span> 图片转 MIDI</div>
                <div class="file-input">
                    <label>📷 上传乐谱图片 <span style="color:#ff8787">*</span></label>
                    <input type="file" id="imageFile" accept="image/*">
                </div>
                <button class="btn-generate" id="extractMidiBtn" style="background: linear-gradient(145deg, #f59e0b, #d97706);">🎹 提取 MIDI</button>
                <div id="imageTaskStatus" class="result-area" style="display: none;">
                    <div id="imageStatusMessage"></div>
                    <div id="midiDownloadArea"></div>
                </div>
            </div>

            <div class="card">
                <div class="card-title"><span>✨</span> 创作新音乐</div>
                <div class="file-input">
                    <label>🎼 目标 MIDI 文件 <span style="color:#ff8787">*</span></label>
                    <input type="file" id="midiFile" accept=".mid,.midi">
                </div>
                <div class="file-input">
                    <label>🎹 参考 MIDI 文件 <span style="color:#ff8787">*</span></label>
                    <input type="file" id="refMidiFile" accept=".mid,.midi">
                </div>
                <div class="file-input">
                    <label>🎤 参考音频 <span class="badge">必选 · WAV</span></label>
                    <input type="file" id="refAudioFile" accept=".wav">
                </div>
                <button class="btn-generate" id="generateBtn">✨ 生成音乐</button>
                <div id="taskStatus" class="result-area" style="display: none;">
                    <div id="statusMessage"></div>
                    <div id="audioResult"></div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-title"><span>📜</span> 我的作品集</div>
            <div id="historyContainer">
                <div style="text-align: center; padding: 2.5rem; color: #8899bb;">✨ 加载中...</div>
            </div>
        </div>
    </div>
</div>

<script>
    (function() {
        "use strict";

        const token = localStorage.getItem('token');
        const username = localStorage.getItem('username') || '音乐家';
        const role = localStorage.getItem('role') || 'user';

        if (!token || role !== 'user') {
            localStorage.clear();
            window.location.replace('/');
            return;
        }

        let accountDisabledFlag = false;

        const usernameDisplay = document.getElementById('usernameDisplay');
        usernameDisplay.innerText = username;
        const avatarEl = document.getElementById('userAvatar');
        avatarEl.innerText = username.charAt(0).toUpperCase();
        document.getElementById('userRoleDisplay').innerText = '创作者';

        let activePollingTaskId = null;
        let pollingInterval = null;
        let currentHistoryPage = 1;
        let cachedTasks = [];

        const midiFileInput = document.getElementById('midiFile');
        const refMidiFileInput = document.getElementById('refMidiFile');
        const refAudioFileInput = document.getElementById('refAudioFile');
        const generateBtn = document.getElementById('generateBtn');
        const taskStatusDiv = document.getElementById('taskStatus');
        const statusMessageSpan = document.getElementById('statusMessage');
        const audioResultDiv = document.getElementById('audioResult');

        const imageFileInput = document.getElementById('imageFile');
        const extractMidiBtn = document.getElementById('extractMidiBtn');
        const imageTaskStatus = document.getElementById('imageTaskStatus');
        const imageStatusMessage = document.getElementById('imageStatusMessage');
        const midiDownloadArea = document.getElementById('midiDownloadArea');

        console.log('[Init] 元素绑定成功');

        function updateStats(tasks) {
            const total = tasks.length;
            const processing = tasks.filter(t => t.status === 'pending' || t.status === 'processing').length;
            const completed = tasks.filter(t => t.status === 'completed').length;
            const failed = tasks.filter(t => t.status === 'failed').length;
            document.getElementById('totalTasks').innerText = total;
            document.getElementById('processingTasks').innerText = processing;
            document.getElementById('completedTasks').innerText = completed;
            document.getElementById('failedTasks').innerText = failed;
        }

        async function authFetch(url, options = {}) {
            const headers = {
                'Authorization': `Bearer ${token}`,
                ...options.headers
            };
            console.log(`[authFetch] ${options.method || 'GET'} ${url}`);
            const response = await fetch(url, { ...options, headers });
            console.log(`[authFetch] 响应状态: ${response.status}`);
            
            let data;
            try {
                data = await response.json();
            } catch (e) {
                data = { code: -1, message: '无效的响应格式' };
            }

            if (response.status === 401 && data.code === 7) {
                if (!accountDisabledFlag) {
                    accountDisabledFlag = true;
                    alert('您的账号已被管理员停用，请重新登录');
                    localStorage.clear();
                    window.location.replace('/');
                }
                throw new Error('Account disabled');
            }
            
            if (!response.ok) {
                const errorMsg = data.message || `HTTP ${response.status}`;
                console.error('[authFetch] 错误响应:', errorMsg);
                throw new Error(errorMsg);
            }
            
            console.log(`[authFetch] 响应数据:`, data);
            return data;
        }

        function stopPolling() {
            if (pollingInterval) {
                clearInterval(pollingInterval);
                pollingInterval = null;
                console.log('[Polling] 已停止');
            }
            activePollingTaskId = null;
        }

        function checkAndSwitchToEarliestPending() {
            const pendingTasks = cachedTasks.filter(t => t.status === 'pending' || t.status === 'processing');
            if (pendingTasks.length === 0) {
                stopPolling();
                console.log('[Polling] 没有未完成任务');
                return;
            }

            pendingTasks.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
            const earliestTask = pendingTasks[0];
            const taskId = earliestTask.task_id;

            if (activePollingTaskId !== taskId) {
                console.log(`[Polling] 切换到最早未完成任务: ${taskId}`);
                startPollingForTask(taskId);
            }
        }

        function startPollingForTask(taskId) {
            stopPolling();
            activePollingTaskId = taskId;
            console.log(`[Polling] 开始轮询任务: ${taskId}`);

            taskStatusDiv.style.display = 'block';
            updateStatus('pending');

            pollingInterval = setInterval(async () => {
                try {
                    const data = await authFetch(`/api/tasks/status?task_id=${taskId}`);
                    const statusData = data.data;
                    const status = statusData.status;

                    updateStatus(status);

                    if (status === 'completed' || status === 'failed') {
                        stopPolling();
                        if (status === 'completed') {
                            showResult(statusData.audio_url);
                        } else {
                            showError(statusData.error_msg || '生成失败');
                        }
                        await loadHistory(currentHistoryPage);
                    }
                } catch (err) {
                    console.error('[Polling] 请求异常:', err);
                    stopPolling();
                    if (err.message.includes('404')) {
                        showError('任务已被管理员删除');
                    } else if (!err.message.includes('Account disabled')) {
                        showError('网络错误或服务器异常');
                    }
                    await loadHistory(currentHistoryPage);
                }
            }, 2000);
        }

        async function submitTask(midiFile, refMidiFile, audioFile) {
            const formData = new FormData();
            formData.append('midi', midiFile);
            formData.append('ref_midi', refMidiFile);
            formData.append('ref_audio', audioFile);

            const data = await authFetch('/api/tasks', {
                method: 'POST',
                body: formData
            });
            if (data.code === 0) {
                return data.data.task_id;
            } else {
                throw new Error(data.message || '提交任务失败');
            }
        }

        function updateStatus(status) {
            taskStatusDiv.style.display = 'block';
            let statusText = '';
            if (status === 'pending') statusText = '⏳ 任务排队中...';
            else if (status === 'processing') statusText = '🎶 AI 正在创作音乐，请稍候...';
            else statusText = `状态: ${status}`;
            statusMessageSpan.innerHTML = `<span class="loading"></span> ${statusText}`;
            audioResultDiv.innerHTML = '';
        }

        function showResult(audioUrl) {
            taskStatusDiv.style.display = 'block';
            statusMessageSpan.innerHTML = '✅ 生成完成！';
            audioResultDiv.innerHTML = `
                <audio controls autoplay>
                    <source src="${audioUrl}" type="audio/wav">
                </audio>
                <br>
                <a href="${audioUrl}" download class="download-link">⬇️ 下载音频</a>
            `;
        }

        function showError(errorMsg) {
            taskStatusDiv.style.display = 'block';
            statusMessageSpan.innerHTML = '';
            audioResultDiv.innerHTML = `<div class="error-message">❌ 生成失败: ${errorMsg}</div>`;
        }

        function enableGenerateButton() {
            generateBtn.disabled = false;
            generateBtn.textContent = '✨ 生成音乐';
        }

        function disableGenerateButton(text = '提交中...') {
            generateBtn.disabled = true;
            generateBtn.textContent = text;
        }

        generateBtn.addEventListener('click', async function(event) {
            event.preventDefault();

            const midiFile = midiFileInput.files[0];
            const refMidiFile = refMidiFileInput.files[0];
            const audioFile = refAudioFileInput.files[0];

            if (!midiFile || !refMidiFile || !audioFile) {
                alert('请确保所有文件都已选择');
                return;
            }

            disableGenerateButton('提交中...');
            try {
                const taskId = await submitTask(midiFile, refMidiFile, audioFile);
                console.log('[Submit] 任务提交成功, taskId=', taskId);
                await loadHistory(currentHistoryPage);
            } catch (err) {
                console.error('[Submit] 提交失败:', err);
                if (!err.message.includes('Account disabled')) {
                    showError(err.message);
                }
            } finally {
                enableGenerateButton();
            }
        });

        extractMidiBtn.addEventListener('click', async function() {
            const imageFile = imageFileInput.files[0];
            if (!imageFile) {
                alert('请选择一张乐谱图片');
                return;
            }

            const formData = new FormData();
            formData.append('image', imageFile);

            imageTaskStatus.style.display = 'block';
            imageStatusMessage.innerHTML = '<span class="loading"></span> 正在提取 MIDI...';
            midiDownloadArea.innerHTML = '';

            try {
                const data = await authFetch('/api/image/to-midi', {
                    method: 'POST',
                    body: formData
                });
                if (data.code === 0) {
                    imageStatusMessage.innerHTML = '✅ 提取成功！';
                    midiDownloadArea.innerHTML = `<a href="${data.data.midi_url}" download class="download-link">⬇️ 下载 MIDI 文件</a>`;
                } else {
                    throw new Error(data.message || '提取失败');
                }
            } catch (err) {
                console.error('[ImageToMidi] 错误:', err);
                imageStatusMessage.innerHTML = '';
                if (!err.message.includes('Account disabled')) {
                    midiDownloadArea.innerHTML = `<div class="error-message">❌ 提取失败: ${err.message}</div>`;
                }
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('token');
            localStorage.removeItem('username');
            localStorage.removeItem('role');
            window.location.replace('/index.html');   // 退出后跳转到登录页
        });

        async function loadHistory(page = 1) {
            currentHistoryPage = page;
            const historyContainer = document.getElementById('historyContainer');
            try {
                const data = await authFetch(`/api/tasks?page=${page}&limit=10`);
                if (data.code === 0 && data.data && data.data.list) {
                    const tasks = data.data.list;
                    const total = data.data.total;
                    const currentPage = data.data.page;
                    const limit = data.data.limit;

                    cachedTasks = tasks;
                    updateStats(tasks);

                    if (tasks.length === 0) {
                        historyContainer.innerHTML = '<div style="text-align: center; padding: 2.5rem; color: #8899bb;">🎼 暂无历史记录，快去创作吧！</div>';
                        stopPolling();
                        return;
                    }

                    let html = '<table class="history-table"><thead><tr><th>任务ID</th><th>状态</th><th>音频</th><th>创建时间</th></tr></thead><tbody>';
                    for (const task of tasks) {
                        const statusText = task.status === 'completed' ? '✅ 已完成' :
                                          (task.status === 'pending' ? '⏳ 等待中' :
                                          (task.status === 'processing' ? '🎶 处理中' : '❌ 失败'));
                        const audioHtml = task.audio_url ? `<audio controls src="${task.audio_url}"></audio>` : '—';
                        html += `<tr>
                            <td>${task.task_id.substring(0, 10)}…</td>
                            <td>${statusText}</td>
                            <td class="history-audio">${audioHtml}</td>
                            <td>${new Date(task.created_at).toLocaleString()}</td>
                        </tr>`;
                    }
                    html += '</tbody></table>';

                    const totalPages = Math.ceil(total / limit);
                    let paginationHtml = '<div class="pagination">';
                    if (currentPage > 1) {
                        paginationHtml += `<button class="page-btn" data-page="${currentPage-1}">← 上一页</button>`;
                    }
                    paginationHtml += `<span style="margin:0 1rem;">第 ${currentPage} / ${totalPages} 页</span>`;
                    if (currentPage < totalPages) {
                        paginationHtml += `<button class="page-btn" data-page="${currentPage+1}">下一页 →</button>`;
                    }
                    paginationHtml += '</div>';

                    historyContainer.innerHTML = html + paginationHtml;

                    document.querySelectorAll('.page-btn').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            const newPage = parseInt(btn.dataset.page);
                            loadHistory(newPage);
                        });
                    });

                    checkAndSwitchToEarliestPending();
                } else {
                    historyContainer.innerHTML = '<div style="text-align: center; padding: 2rem; color: #94a3b8;">加载历史记录失败</div>';
                }
            } catch (err) {
                console.error('[LoadHistory] 错误:', err);
                if (!err.message.includes('Account disabled')) {
                    historyContainer.innerHTML = '<div style="text-align: center; padding: 2rem; color: #f87171;">加载失败，请检查网络</div>';
                }
            }
        }

        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                if (pollingInterval) {
                    clearInterval(pollingInterval);
                    pollingInterval = null;
                }
            } else {
                if (activePollingTaskId && !pollingInterval) {
                    startPollingForTask(activePollingTaskId);
                }
            }
        });

        loadHistory();
    })();
</script>
</body>
</html>
