<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音乐合成</title>
    <style>
        /* ========== 前端同事最终样式（一字未改） ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
            background-color: #ffffff;
            background-image:
                linear-gradient(to bottom, #eeeeee 1px, transparent 1px),
                linear-gradient(to bottom, #eeeeee 1px, transparent 1px);
            background-size: 100% 40px;
            background-position: 0 20px, 0 60px;
            min-height: 100vh;
            color: #333333;
            padding: 2rem;
            line-height: 1.5;
            transition: all 0.4s ease;
            overflow-x: hidden;
            position: relative;
        }

        body.dark {
            background-color: #111111;
            background-image:
                linear-gradient(to bottom, #222222 1px, transparent 1px),
                linear-gradient(to bottom, #222222 1px, transparent 1px);
            background-size: 100% 40px;
            background-position: 0 20px, 0 60px;
            color: #eeeeee;
        }

        .notes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }
        .note {
            position: absolute;
            color: rgba(100, 100, 100, 0.3);
            font-size: 40px;
            animation: fall linear infinite;
            top: -60px;
        }
        body.dark .note {
            color: rgba(200, 200, 200, 0.25);
        }
        @keyframes fall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            100% { transform: translateY(100vh) rotate(360deg); opacity: 0; }
        }

        .container-music {
            transform: scale(0.6);
            transform-origin: top right;
            width: 175px;
            height: 175px;
            background-color: #dddddd;
            border-radius: 10px;
            position: fixed;
            top: 20px;
            right: 20px;
            box-shadow: 5px 5px 0 0 #666666;
            cursor: pointer;
            z-index: 9999;
            transition: all 0.3s ease;
        }
        .plate { width: fit-content; }
        .plate .black,.plate .white,.plate .center,.plate .border { border-radius: 100%; }
        .container-music,.plate .black,.plate .white,.plate .border { display: flex; align-items: center; justify-content: center; }
        .plate .black { width: 150px; height: 150px; background-color: #666666; animation: rotation 2s infinite linear; }
        @keyframes rotation { from { transform: rotate(0deg); } to { transform: rotate(359deg); } }
        .plate .white { width: 70px; height: 70px; background-color: #f5f5f5; }
        .plate .center { width: 20px; height: 20px; background-color: #666666; }
        .plate .border { width: 111px; height: 111px; border-top:3px solid #f5f5f5; border-bottom:3px solid #f5f5f5; border-left:3px solid #666666; border-right:3px solid #666666; }
        .player { display: flex; align-items: center; justify-content: center; flex-direction: column; width: fit-content; position: absolute; bottom:0; right:0; margin-bottom:8px; margin-right:8px; rotate:-45deg; }
        .player .circ { width:25px; height:25px; background-color:#f5f5f5; border-radius:100%; z-index:1; }
        .player .rect { width:10px; height:55px; background-color:#f5f5f5; position:absolute; bottom:0; margin-bottom:5px; }

        button {
            --button_radius: 0.75em;
            --button_color: #e8e8e8;
            --button_outline_color: #000000;
            font-size: 16px;
            font-weight: bold;
            border: none;
            cursor: pointer;
            border-radius: var(--button_radius);
            background: var(--button_outline_color);
        }
        .button_top {
            display: block;
            box-sizing: border-box;
            border: 2px solid var(--button_outline_color);
            border-radius: var(--button_radius);
            padding: 0.5em 1.2em;
            background: var(--button_color);
            color: var(--button_outline_color);
            transform: translateY(-0.2em);
            transition: transform 0.1s ease;
        }
        button:hover .button_top {
            transform: translateY(-0.33em);
        }
        button:active .button_top {
            transform: translateY(0);
        }
        body.dark button {
            --button_color: #2d3748;
            --button_outline_color: #e2e8f0;
        }
        button.small .button_top {
            padding: 0.3em 0.8em;
            font-size: 14px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
            padding: 1rem 2rem;
            background: rgba(255,255,255,0.4);
            backdrop-filter: blur(15px);
            border-radius: 60px;
            border: 1px solid rgba(0,0,0,0.08);
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.1);
            position: relative;
            z-index: 999;
        }
        body.dark .header {
            background: rgba(20,20,20,0.5);
            border: 1px solid rgba(100,100,100,0.2);
            box-shadow: 0 10px 30px -10px rgba(0,0,0,0.5);
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo h1 {
            font-size: 1.9rem;
            font-weight: 700;
            color: #333333;
            letter-spacing: -0.5px;
        }
        body.dark .logo h1 {
            color: #ffffff;
        }

        .user-area {
            display: flex;
            align-items: center;
            gap: 20px;
        }

        .user-profile {
            display: flex;
            align-items: center;
            gap: 12px;
            background: rgba(0,0,0,0.03);
            padding: 6px 18px 6px 12px;
            border-radius: 40px;
            border: 1px solid rgba(0,0,0,0.1);
            cursor: pointer;
            position: relative;
            user-select: none;
            z-index: 1000;
        }
        body.dark .user-profile {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.1);
        }

        .avatar {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            background: #666666;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 1.2rem;
            color: white;
            text-transform: uppercase;
            box-shadow: 0 0 15px rgba(100,100,100,0.4);
            border: 2px solid rgba(255, 255, 255, 0.2);
            background-size: cover;
            background-position: center;
        }

        .user-text {
            display: flex;
            flex-direction: column;
        }

        .user-name {
            font-weight: 600;
            line-height: 1.2;
        }
        body:not(.dark) .user-name {
            color: #333333;
        }
        body.dark .user-name {
            color: #eeeeee;
        }

        .user-role {
            font-size: 0.75rem;
            opacity: 0.7;
        }
        body:not(.dark) .user-role {
            color: #333333;
        }
        body.dark .user-role {
            color: #cccccc;
        }

        .dropdown-menu {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            min-width: 180px;
            background: rgba(255,255,255,0.95);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 0.5rem 0;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            border: 1px solid rgba(0,0,0,0.1);
            z-index: 1001;
            display: none;
        }
        body.dark .dropdown-menu {
            background: rgba(20,20,20,0.95);
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            border: 1px solid rgba(100,100,100,0.2);
        }
        .dropdown-menu.show { display: block; }

        .dropdown-item {
            padding: 0.7rem 1.2rem;
            cursor: pointer;
            transition: background 0.2s;
            font-size: 0.95rem;
        }
        body:not(.dark) .dropdown-item {
            color: #222222;
        }
        body.dark .dropdown-item {
            color: #eeeeee;
        }
        .dropdown-item:hover {
            background: rgba(0,0,0,0.06);
        }
        body.dark .dropdown-item:hover {
            background: rgba(100,100,100,0.3);
        }

        .dropdown-divider {
            height: 1px;
            margin: 0.3rem 0;
        }
        body:not(.dark) .dropdown-divider {
            background: rgba(0,0,0,0.1);
        }
        body.dark .dropdown-divider {
            background: rgba(100,100,100,0.2);
        }

        .two-columns {
            display: grid;
            grid-template-columns: 1fr 1.8fr;
            gap: 2rem;
        }

        .card {
            background: rgba(255,255,255,0.3);
            backdrop-filter: blur(12px);
            border-radius: 32px;
            padding: 1.8rem;
            margin-bottom: 2rem;
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.1), 0 0 0 1px rgba(0,0,0,0.04) inset;
            border: 1px solid rgba(0,0,0,0.04);
            transition: transform 0.2s ease, box-shadow 0.2s;
        }
        body.dark .card {
            background: rgba(20,20,20,0.5);
            box-shadow: 0 20px 40px -10px rgba(0,0,0,0.5), 0 0 0 1px rgba(100,100,100,0.1) inset;
            border: 1px solid rgba(100,100,0.05);
        }

        .card:hover {
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.15);
        }
        body.dark .card:hover {
            box-shadow: 0 25px 50px -12px #000000;
        }

        .card-title {
            font-size: 1.4rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            font-weight: 600;
            letter-spacing: -0.3px;
            padding-bottom: 0.8rem;
        }
        body:not(.dark) .card-title {
            color: #333333;
            border-bottom: 1px solid rgba(0,0,0,0.08);
        }
        body.dark .card-title {
            color: #eeeeee;
            border-bottom: 1px solid rgba(100,100,100,0.2);
        }

        .profile-card {
            background: rgba(255,255,255,0.3);
            border: 1px solid rgba(0,0,0,0.08);
        }
        body.dark .profile-card {
            background: linear-gradient(145deg, rgba(40,40,40,0.7), rgba(20,20,20,0.8));
            border: 1px solid rgba(100,100,100,0.15);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 1rem;
            margin: 1.5rem 0;
        }

        .stat-item {
            border-radius: 20px;
            padding: 1rem 0.5rem;
            text-align: center;
        }
        body:not(.dark) .stat-item {
            background: rgba(0,0,0,0.04);
            border: 1px solid rgba(0,0,0,0.06);
        }
        body.dark .stat-item {
            background: rgba(0,0,0,0.2);
            border: 1px solid rgba(100,100,100,0.1);
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
        }
        body:not(.dark) .stat-value {
            color: #444444;
        }
        body.dark .stat-value {
            color: #dddddd;
        }

        .stat-label {
            font-size: 0.8rem;
            opacity: 0.7;
            margin-top: 0.2rem;
        }
        body:not(.dark) .stat-label {
            color: #333333;
        }
        body.dark .stat-label {
            color: #cccccc;
        }

        .upload-box {
            border-radius: 10px;
            box-shadow: 4px 4px 30px rgba(0, 0, 0, .1);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            padding: 10px;
            gap: 10px;
            margin-bottom: 15px;
            height: 180px;
        }
        body:not(.dark) .upload-box {
            background-color: rgba(100, 100, 100, 0.04);
        }
        body.dark .upload-box {
            background-color: rgba(100, 100, 100, 0.08);
        }

        .upload-area {
            flex: 1;
            width: 100%;
            border: 2px dashed #666666;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            gap: 8px;
            padding: 10px;
        }

        .upload-area p {
            text-align: center;
            color: inherit;
            margin: 0;
        }

        .upload-btn {
            width: 100%;
            height: 40px;
            padding: 8px;
            border-radius: 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            color: inherit;
            border: none;
        }
        body:not(.dark) .upload-btn {
            background-color: rgba(100, 100, 100, 0.06);
        }
        body.dark .upload-btn {
            background-color: rgba(150, 150, 150, 0.08);
        }

        .upload-btn p {
            flex: 1;
            text-align: center;
            margin: 0;
        }

        /* 文件名显示区域（现在在框内） */
        .file-name {
            font-size: 0.85rem;
            color: inherit;
            opacity: 0.9;
            text-align: center;
            word-break: break-all;
            padding: 0 4px;
            font-weight: 500;
        }

        input[type="file"] {
            display: none;
        }

        .result-area {
            border-radius: 24px;
            padding: 1.2rem;
            margin-top: 1.8rem;
            text-align: center;
            backdrop-filter: blur(8px);
        }
        body:not(.dark) .result-area {
            background: rgba(255,255,255,0.2);
            border: 1px solid #cccccc;
        }
        body.dark .result-area {
            background: rgba(0,0,0,0.2);
            border: 1px solid #444444;
        }

        .loading {
            display: inline-block;
            width: 22px;
            height: 22px;
            border: 3px solid #666666;
            border-top-color: #aaaaaa;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin-right: 0.6rem;
            vertical-align: middle;
        }
        body.dark .loading {
            border: 3px solid #888888;
            border-top-color: #cccccc;
        }

        @keyframes spin { to { transform: rotate(360deg); } }
        audio { width: 100%; margin:1rem 0 0.5rem; border-radius:30px; }
        body:not(.dark) audio { background: #eeeeee; }
        body.dark audio { background: #222222; }
        .download-link { display:inline-block; padding:0.6rem 1.4rem; border-radius:40px; text-decoration:none; margin-top:0.8rem; font-weight:500; }
        body:not(.dark) .download-link { background:#666666; color:white; }
        body.dark .download-link { background:#aaaaaa; color:#111111; }
        .error-message { padding:0.9rem; border-radius:20px; border-left:5px solid #666666; }
        body:not(.dark) .error-message { color:#666666; background:#f5f5f5; }
        body.dark .error-message { color:#cccccc; background:#222222; }

        .history-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
        }

        .history-table th {
            text-align: left;
            padding: 1rem 0.5rem 0.8rem 0.5rem;
            font-weight: 600;
            border-bottom: 2px solid #cccccc;
        }
        body:not(.dark) .history-table th {
            color: #333333;
        }
        body.dark .history-table th {
            color: #eeeeee;
            border-bottom: 2px solid #444444;
        }

        .history-table td {
            padding: 0.9rem 0.5rem;
            border-bottom: 1px solid #dddddd;
        }
        body:not(.dark) .history-table td {
            color: #333333;
        }
        body.dark .history-table td {
            border-bottom: 1px solid #333333;
            color: #cccccc;
        }

        .history-audio audio {
            width: 140px;
            height: 32px;
        }

        .pagination {
            display: flex;
            justify-content: center;
            gap: 1rem;
            margin-top: 2rem;
        }

        .badge {
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            font-size: 0.8rem;
        }
        body:not(.dark) .badge {
            background: rgba(0,0,0,0.06);
            color: #333333;
        }
        body.dark .badge {
            background: #333333;
            color: #eeeeee;
        }

        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: center;
        }
        body:not(.dark) .modal-overlay {
            background: rgba(0,0,0,0.3);
        }
        body.dark .modal-overlay {
            background: rgba(0,0,0,0.7);
        }

        .modal-content {
            padding: 2rem;
            border-radius: 20px;
            width: 400px;
            max-width: 90%;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
        }
        body:not(.dark) .modal-content {
            background: #ffffff;
        }
        body.dark .modal-content {
            background: #222222;
            box-shadow: 0 20px 40px rgba(0,0,0,0.5);
        }

        .modal-content h3 {
            margin-bottom: 1.5rem;
        }
        body:not(.dark) .modal-content h3 {
            color: #222222;
        }
        body.dark .modal-content h3 {
            color: #eeeeee;
        }

        .modal-content input {
            width: 100%;
            padding: 0.8rem;
            border-radius: 10px;
            margin-bottom: 1rem;
        }
        body:not(.dark) .modal-content input {
            border: 1px solid #cccccc;
            background: #f9f9f9;
            color: #222222;
        }
        body.dark .modal-content input {
            border: 1px solid #444444;
            background: #111111;
            color: #eeeeee;
        }

        .modal-actions {
            display: flex;
            gap: 0.8rem;
            justify-content: flex-end;
        }

            position: relative;
            border-radius: 10px;
            height: 10px;

            margin-left: 6px;
            vertical-align: middle;
        }

        @keyframes move-arrows {
          100% { background-position: 20px 0; }
        }

        @media (max-width: 900px) {
            .two-columns { grid-template-columns:1fr; }
            body { padding:1rem; }
            .header { flex-direction:column; align-items:stretch; gap:1rem; }
            .user-area { justify-content:space-between; }
        }
    </style>

<body>

<div class="notes" id="notes"></div>
<div class="container-music" onclick="toggleDarkMode()">
    <div class="plate">
        <div class="black">
            <div class="border">
                <div class="white">
                    <div class="center"></div>
                </div>
            </div>
        </div>
    </div>
    <div class="player">
        <div class="rect"></div>
        <div class="circ"></div>
    </div>
</div>

<div class="container">
    <div class="header">
        <div class="logo">
            <h1>音乐合成</h1>
        </div>
        <div class="user-area">
            <div class="user-profile" id="userProfileTrigger">
                <div class="avatar" id="userAvatar">U</div>
                <div class="user-text">
                    <span class="user-name" id="usernameDisplay">音乐家</span>
                    <span class="user-role" id="userRoleDisplay">创作者</span>
                </div>
                <div class="dropdown-menu" id="userDropdown">
                    <div class="dropdown-item" id="changeAvatarBtn">更换头像</div>
                    <div class="dropdown-item" id="changePasswordBtn">修改密码</div>
                    <div class="dropdown-divider"></div>
                    <div class="dropdown-item" id="dropdownLogoutBtn">退出登录</div>
                </div>
            </div>
            <button id="logoutBtn"><span class="button_top">退出</span></button>
        </div>
    </div>

    <div class="two-columns">
        <div>
            <div class="card profile-card">
                <div class="card-title">我的工作室</div>
                <div class="stats-grid">
                    <div class="stat-item"><div class="stat-value" id="totalTasks">0</div><div class="stat-label">总作品</div></div>
                    <div class="stat-item"><div class="stat-value" id="processingTasks">0</div><div class="stat-label">进行中</div></div>
                    <div class="stat-item"><div class="stat-value" id="completedTasks">0</div><div class="stat-label">已完成</div></div>
                    <div class="stat-item"><div class="stat-value" id="failedTasks">0</div><div class="stat-label">失败</div></div>
                </div>
            </div>

            <div class="card">
                <div class="card-title">图片转 MIDI</div>
                <div class="upload-box">
                    <div class="upload-area">
                        <p>点击或拖拽文件到此处</p>
                        <span class="file-name" id="imageFileName"></span>
                    </div>
                    <label class="upload-btn" for="imageFile">
                        <p>选择文件</p>
                    </label>
                    <input type="file" id="imageFile" accept="image/*">
                </div>
                <button id="extractMidiBtn"><span class="button_top">提取 MIDI</span></button>
                <div id="imageTaskStatus" class="result-area" style="display: none;">
                    <div id="imageStatusMessage"></div>
                    <div id="midiDownloadArea"></div>
                </div>
            </div>

            <div class="card">
                <div class="card-title">创作新音乐</div>
                <div class="upload-box">
                    <div class="upload-area">
                        <p>目标 MIDI 文件</p>
                        <span class="file-name" id="midiFileName"></span>
                    </div>
                    <label class="upload-btn" for="midiFile">
                        <p>选择文件</p>
                    </label>
                    <input type="file" id="midiFile" accept=".mid,.midi">
                </div>
                <div class="upload-box">
                    <div class="upload-area">
                        <p>参考 MIDI 文件</p>
                        <span class="file-name" id="refMidiFileName"></span>
                    </div>
                    <label class="upload-btn" for="refMidiFile">
                        <p>选择文件</p>
                    </label>
                    <input type="file" id="refMidiFile" accept=".mid,.midi">
                </div>
                <div class="upload-box">
                    <div class="upload-area">
                        <p>参考音频 WAV</p>
                        <span class="file-name" id="refAudioFileName"></span>
                    </div>
                    <label class="upload-btn" for="refAudioFile">
                        <p>选择文件</p>
                    </label>
                    <input type="file" id="refAudioFile" accept=".wav">
                </div>
                <button id="generateBtn"><span class="button_top">生成音乐</span></button>
                <div id="taskStatus" class="result-area" style="display: none;">
                    <div id="statusMessage"></div>
                    <div id="audioResult"></div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">我的作品集</div>
            <div id="historyContainer">
                <div style="text-align: center; padding: 2.5rem; color: #8899bb;">✨ 加载中...</div>
            </div>
        </div>
    </div>
</div>

<div class="modal-overlay" id="passwordModal">
    <div class="modal-content">
        <h3>修改密码</h3>
        <input type="password" id="oldPassword" placeholder="旧密码">
        <input type="password" id="newPassword" placeholder="新密码（至少6位）">
        <input type="password" id="confirmPassword" placeholder="确认新密码">
        <div class="modal-actions">
            <button onclick="closePasswordModal()"><span class="button_top">取消</span></button>
            <button onclick="submitChangePassword()"><span class="button_top">确认</span></button>
        </div>
    </div>
</div>

<input type="file" id="avatarFileInput" accept="image/jpeg,image/png,image/gif" style="display:none;">

<script>
    // 暗色模式切换
    function toggleDarkMode() {
        document.body.classList.toggle('dark');
        localStorage.setItem('darkMode', document.body.classList.contains('dark'));
    }

    function createNotes() {
        const notesContainer = document.getElementById('notes');
        const notes = ['♪','♫','♩','♬'];
        setInterval(()=>{
            const note = document.createElement('div');
            note.classList.add('note');
            note.innerText = notes[Math.floor(Math.random()*notes.length)];
            note.style.left = Math.random()*100+'vw';
            note.style.animationDuration = (Math.random()*4+8)+'s';
            notesContainer.appendChild(note);
            setTimeout(()=>note.remove(),10000);
        },1200);
    }

    // ========== 业务逻辑 ==========
    (function() {
        "use strict";

        if (localStorage.getItem('darkMode') === 'true') {
            document.body.classList.add('dark');
        }
        createNotes();

        const token = localStorage.getItem('token');
        const username = localStorage.getItem('username') || '音乐家';
        const role = localStorage.getItem('role') || 'user';

        if (!token || role !== 'user') {
            localStorage.clear();
            window.location.replace('/');
            return;
        }

        let accountDisabledFlag = false;

        const usernameDisplay = document.getElementById('usernameDisplay');
        usernameDisplay.innerText = username;
        const avatarEl = document.getElementById('userAvatar');
        const savedAvatar = localStorage.getItem('avatar');
        if (savedAvatar) {
            avatarEl.style.backgroundImage = `url(${savedAvatar})`;
            avatarEl.innerText = '';
        } else {
            avatarEl.innerText = username.charAt(0).toUpperCase();
        }
        document.getElementById('userRoleDisplay').innerText = '创作者';

        let activePollingTaskId = null;
        let pollingInterval = null;
        let currentHistoryPage = 1;
        let cachedTasks = [];

        const midiFileInput = document.getElementById('midiFile');
        const refMidiFileInput = document.getElementById('refMidiFile');
        const refAudioFileInput = document.getElementById('refAudioFile');
        const generateBtn = document.getElementById('generateBtn');
        const taskStatusDiv = document.getElementById('taskStatus');
        const statusMessageSpan = document.getElementById('statusMessage');
        const audioResultDiv = document.getElementById('audioResult');

        const imageFileInput = document.getElementById('imageFile');
        const extractMidiBtn = document.getElementById('extractMidiBtn');
        const imageTaskStatus = document.getElementById('imageTaskStatus');
        const imageStatusMessage = document.getElementById('imageStatusMessage');
        const midiDownloadArea = document.getElementById('midiDownloadArea');

        const avatarFileInput = document.getElementById('avatarFileInput');
        const passwordModal = document.getElementById('passwordModal');

        // 文件名显示元素
        const midiFileName = document.getElementById('midiFileName');
        const refMidiFileName = document.getElementById('refMidiFileName');
        const refAudioFileName = document.getElementById('refAudioFileName');
        const imageFileName = document.getElementById('imageFileName');

        console.log('[Init] 元素绑定成功');

        function updateStats(tasks) {
            const total = tasks.length;
            const processing = tasks.filter(t => t.status === 'pending' || t.status === 'processing').length;
            const completed = tasks.filter(t => t.status === 'completed').length;
            const failed = tasks.filter(t => t.status === 'failed').length;
            document.getElementById('totalTasks').innerText = total;
            document.getElementById('processingTasks').innerText = processing;
            document.getElementById('completedTasks').innerText = completed;
            document.getElementById('failedTasks').innerText = failed;
        }

        async function authFetch(url, options = {}) {
            const headers = {
                'Authorization': `Bearer ${token}`,
                ...options.headers
            };
            console.log(`[authFetch] ${options.method || 'GET'} ${url}`);
            const response = await fetch(url, { ...options, headers });
            console.log(`[authFetch] 响应状态: ${response.status}`);

            let data;
            try {
                data = await response.json();
            } catch (e) {
                data = { code: -1, message: '无效的响应格式' };
            }

            if (response.status === 401 && data.code === 7) {
                if (!accountDisabledFlag) {
                    accountDisabledFlag = true;
                    alert('您的账号已被管理员停用，请重新登录');
                    localStorage.clear();
                    window.location.replace('/');
                }
                throw new Error('Account disabled');
            }

            if (!response.ok) {
                const errorMsg = data.message || `HTTP ${response.status}`;
                console.error('[authFetch] 错误响应:', errorMsg);
                throw new Error(errorMsg);
            }

            console.log(`[authFetch] 响应数据:`, data);
            return data;
        }

        function stopPolling() {
            if (pollingInterval) {
                clearInterval(pollingInterval);
                pollingInterval = null;
                console.log('[Polling] 已停止');
            }
            activePollingTaskId = null;
        }

        function checkAndSwitchToEarliestPending() {
            const pendingTasks = cachedTasks.filter(t => t.status === 'pending' || t.status === 'processing');
            if (pendingTasks.length === 0) {
                stopPolling();
                console.log('[Polling] 没有未完成任务');
                return;
            }
            pendingTasks.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
            const earliestTask = pendingTasks[0];
            const taskId = earliestTask.task_id;
            if (activePollingTaskId !== taskId) {
                console.log(`[Polling] 切换到最早未完成任务: ${taskId}`);
                startPollingForTask(taskId);
            }
        }

        function startPollingForTask(taskId) {
            stopPolling();
            activePollingTaskId = taskId;
            console.log(`[Polling] 开始轮询任务: ${taskId}`);
            taskStatusDiv.style.display = 'block';
            updateStatus('pending');
            pollingInterval = setInterval(async () => {
                try {
                    const data = await authFetch(`/api/tasks/status?task_id=${taskId}`);
                    const statusData = data.data;
                    const status = statusData.status;
                    updateStatus(status);
                    if (status === 'completed' || status === 'failed') {
                        stopPolling();
                        if (status === 'completed') {
                            showResult(statusData.audio_url);
                        } else {
                            showError(statusData.error_msg || '生成失败');
                        }
                        await loadHistory(currentHistoryPage);
                    }
                } catch (err) {
                    console.error('[Polling] 请求异常:', err);
                    stopPolling();
                    if (err.message.includes('404')) {
                        showError('任务已被管理员删除');
                    } else if (!err.message.includes('Account disabled')) {
                        showError('网络错误或服务器异常');
                    }
                    await loadHistory(currentHistoryPage);
                }
            }, 2000);
        }

        async function submitTask(midiFile, refMidiFile, audioFile) {
            const formData = new FormData();
            formData.append('midi', midiFile);
            formData.append('ref_midi', refMidiFile);
            formData.append('ref_audio', audioFile);
            const data = await authFetch('/api/tasks', { method: 'POST', body: formData });
            if (data.code === 0) return data.data.task_id;
            else throw new Error(data.message || '提交失败');
        }

        function updateStatus(status) {
            let text = status === 'pending' ? '⏳ 任务排队中...' : (status === 'processing' ? '🎶 AI 正在创作音乐...' : `状态: ${status}`);
            statusMessageSpan.innerHTML = `<span class="loading"></span> ${text}`;
            audioResultDiv.innerHTML = '';
        }

        function showResult(audioUrl) {
            statusMessageSpan.innerHTML = '✅ 生成完成！';
            audioResultDiv.innerHTML = `<audio controls autoplay src="${audioUrl}"><br><a href="${audioUrl}" download class="download-link">⬇️ 下载音频</a>`;
        }

        function showError(msg) {
            statusMessageSpan.innerHTML = '';
            audioResultDiv.innerHTML = `<div class="error-message">❌ 生成失败: ${msg}</div>`;
        }

        function enableGenerateButton() { generateBtn.disabled = false; }
        function disableGenerateButton() { generateBtn.disabled = true; }

        generateBtn.addEventListener('click', async (e) => {
            e.preventDefault();
            const m = midiFileInput.files[0], r = refMidiFileInput.files[0], a = refAudioFileInput.files[0];
            if (!m || !r || !a) { alert('请确保所有文件都已选择'); return; }
            disableGenerateButton();
            try {
                const taskId = await submitTask(m, r, a);
                await loadHistory(currentHistoryPage);
            } catch (err) { if (!err.message.includes('Account disabled')) showError(err.message); }
            finally { enableGenerateButton(); }
        });

        extractMidiBtn.addEventListener('click', async () => {
            const file = imageFileInput.files[0];
            if (!file) { alert('请选择一张乐谱图片'); return; }
            const fd = new FormData(); fd.append('image', file);
            imageTaskStatus.style.display = 'block';
            imageStatusMessage.innerHTML = '<span class="loading"></span> 正在提取 MIDI...';
            midiDownloadArea.innerHTML = '';
            try {
                const data = await authFetch('/api/image/to-midi', { method: 'POST', body: fd });
                if (data.code === 0) {
                    imageStatusMessage.innerHTML = '✅ 提取成功！';
                    midiDownloadArea.innerHTML = `<a href="${data.data.midi_url}" download class="download-link">⬇️ 下载 MIDI</a>`;
                } else throw new Error(data.message);
            } catch (err) {
                imageStatusMessage.innerHTML = '';
                midiDownloadArea.innerHTML = `<div class="error-message">❌ 提取失败: ${err.message}</div>`;
            }
        });

        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.clear();
            window.location.replace('/');
        });

        async function loadHistory(page = 1) {
            currentHistoryPage = page;
            const container = document.getElementById('historyContainer');
            try {
                const data = await authFetch(`/api/tasks?page=${page}&limit=10`);
                if (data.code === 0 && data.data.list) {
                    const tasks = data.data.list;
                    cachedTasks = tasks;
                    updateStats(tasks);
                    if (tasks.length === 0) {
                        container.innerHTML = '<div style="text-align:center; padding:2.5rem;">🎼 暂无历史记录</div>';
                        stopPolling(); return;
                    }
                    let html = '<table class="history-table"><thead><tr><th>任务ID</th><th>状态</th><th>音频</th><th>创建时间</th></tr></thead><tbody>';
                    tasks.forEach(t => {
                        const statusText = t.status === 'completed' ? '✅ 已完成' : (t.status === 'pending' ? '⏳ 等待中' : (t.status === 'processing' ? '🎶 处理中' : '❌ 失败'));
                        const audioHtml = t.audio_url ? `<audio controls src="${t.audio_url}">` : '—';
                        html += `<tr><td>${t.task_id.substring(0,10)}…</td><td>${statusText}</td><td>${audioHtml}</td><td>${new Date(t.created_at).toLocaleString()}</td></tr>`;
                    });
                    html += '</tbody></table>';
                    const totalPages = Math.ceil(data.data.total / data.data.limit);
                    let pag = '<div class="pagination">';
                    if (data.data.page > 1) pag += `<button class="small" onclick="loadHistory(${data.data.page-1})"><span class="button_top">上一页</span></button>`;
                    pag += `<span>第 ${data.data.page} / ${totalPages} 页</span>`;
                    if (data.data.page < totalPages) pag += `<button class="small" onclick="loadHistory(${data.data.page+1})"><span class="button_top">下一页</span></button>`;
                    pag += '</div>';
                    container.innerHTML = html + pag;
                    checkAndSwitchToEarliestPending();
                } else container.innerHTML = '<div style="text-align:center;">加载失败</div>';
            } catch (err) {
                if (!err.message.includes('Account disabled')) container.innerHTML = '<div style="text-align:center;">加载失败</div>';
            }
        }
        window.loadHistory = loadHistory;

        // 头像上传
        let avatarUploading = false;
        avatarFileInput.addEventListener('change', async () => {
            const file = avatarFileInput.files[0];
            if (!file || avatarUploading) return;
            avatarUploading = true;
            const fd = new FormData(); fd.append('avatar', file);
            try {
                const data = await authFetch('/api/user/avatar', { method: 'POST', body: fd });
                if (data.code === 0) {
                    const url = data.data.avatar_url;
                    avatarEl.style.backgroundImage = `url(${url})`;
                    avatarEl.innerText = '';
                    localStorage.setItem('avatar', url);
                    alert('头像上传成功');
                } else alert('上传失败: ' + data.message);
            } catch { alert('网络错误'); }
            finally { avatarUploading = false; avatarFileInput.value = ''; }
        });

        // 下拉菜单
        const userTrigger = document.getElementById('userProfileTrigger');
        const dropdown = document.getElementById('userDropdown');
        userTrigger.addEventListener('click', (e) => { e.stopPropagation(); dropdown.classList.toggle('show'); });
        document.addEventListener('click', () => dropdown.classList.remove('show'));
        document.getElementById('changeAvatarBtn').addEventListener('click', () => { dropdown.classList.remove('show'); avatarFileInput.click(); });
        document.getElementById('changePasswordBtn').addEventListener('click', () => { dropdown.classList.remove('show'); passwordModal.style.display = 'flex'; });
        document.getElementById('dropdownLogoutBtn').addEventListener('click', () => { localStorage.clear(); window.location.replace('/'); });

        window.closePasswordModal = () => {
            passwordModal.style.display = 'none';
            document.getElementById('oldPassword').value = document.getElementById('newPassword').value = document.getElementById('confirmPassword').value = '';
        };
        window.submitChangePassword = async () => {
            const oldPwd = document.getElementById('oldPassword').value.trim();
            const newPwd = document.getElementById('newPassword').value.trim();
            const confirm = document.getElementById('confirmPassword').value.trim();
            if (!oldPwd || !newPwd || !confirm) { alert('请填写完整'); return; }
            if (newPwd.length < 6) { alert('新密码至少6位'); return; }
            if (newPwd !== confirm) { alert('两次输入不一致'); return; }
            try {
                const data = await authFetch('/api/user/change-password', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ old_password: oldPwd, new_password: newPwd })
                });
                if (data.code === 0) {
                    alert('密码修改成功，请重新登录');
                    localStorage.clear();
                    window.location.replace('/');
                } else alert('修改失败: ' + data.message);
            } catch { alert('网络错误'); }
        };

        // 文件名显示绑定（现在更新框内的文件名）
        midiFileInput.addEventListener('change', function() {
            const file = this.files[0];
            midiFileName.textContent = file ? file.name : '';
        });
        refMidiFileInput.addEventListener('change', function() {
            const file = this.files[0];
            refMidiFileName.textContent = file ? file.name : '';
        });
        refAudioFileInput.addEventListener('change', function() {
            const file = this.files[0];
            refAudioFileName.textContent = file ? file.name : '';
        });
        imageFileInput.addEventListener('change', function() {
            const file = this.files[0];
            imageFileName.textContent = file ? file.name : '';
        });

        loadHistory();
    })();
</script>
</body>
</html>
