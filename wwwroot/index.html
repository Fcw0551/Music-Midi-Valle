<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>音乐登录界面</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: "Microsoft YaHei", sans-serif;
        }

        body {
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            background-color: #f5f7fa;
            background-image:
                linear-gradient(to bottom, #e0e6ed 1px, transparent 1px),
                linear-gradient(to bottom, #e0e6ed 1px, transparent 1px);
            background-size: 100% 40px;
            background-position: 0 20px, 0 60px;
            position: relative;
            transition: all 0.4s ease;
            overflow: hidden;
        }

        /* 黑夜模式 */
        body.dark {
            background-color: #222;
            background-image:
                linear-gradient(to bottom, #333 1px, transparent 1px),
                linear-gradient(to bottom, #333 1px, transparent 1px);
        }

        /* 暗黑模式下切换文字变白 */
        body.dark .card-side::before,
        body.dark .card-side::after {
            color: #fff !important;
        }

        body::before, body::after {
            content: "♪";
            position: absolute;
            font-size: 36px;
            color: #8899a6;
            opacity: 0.3;
        }
        body::before {
            top: 15%;
            left: 10%;
        }
        body::after {
            bottom: 20%;
            right: 12%;
            content: "♫";
        }

        /* ====================== 音符掉落动画 ====================== */
        .notes {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
        }

        .note {
            position: absolute;
            color: rgba(136, 153, 166, 0.4);
            font-size: 40px;
            animation: fall linear infinite;
            top: -60px;
        }

        body.dark .note {
            color: rgba(255, 255, 255, 0.3);
        }

        @keyframes fall {
            0% {
                transform: translateY(0) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(100vh) rotate(360deg);
                opacity: 0;
            }
        }

        /* 黑胶唱片组件 */
        .container {
            width: 175px;
            height: 175px;
            background-color: #ABC4AA;
            border-radius: 10px;
            position: fixed;
            top: 20px;
            right: 20px;
            box-shadow: 5px 5px 0 0 #675D50;
            cursor: pointer;
            z-index: 99;
            transition: all 0.3s ease;
        }

        .plate {
            width: fit-content;
        }

        .plate .black,
        .plate .white,
        .plate .center,
        .plate .border {
            border-radius: 100%;
        }

        .container,
        .plate .black,
        .plate .white,
        .plate .border {
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .plate .black {
            width: 150px;
            height: 150px;
            background-color: #675D50;
            animation: rotation 2s infinite linear;
        }

        @keyframes rotation {
            from { transform: rotate(0deg); }
            to { transform: rotate(359deg); }
        }

        .plate .white {
            width: 70px;
            height: 70px;
            background-color: #F3DEBA;
        }

        .plate .center {
            width: 20px;
            height: 20px;
            background-color: #675D50;
        }

        .plate .border {
            width: 111px;
            height: 111px;
            border-top: 3px solid #F3DEBA;
            border-bottom: 3px solid #F3DEBA;
            border-left: 3px solid #675D50;
            border-right: 3px solid #675D50;
        }

        .player {
            display: flex;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            width: fit-content;
            position: absolute;
            bottom: 0;
            right: 0;
            margin-bottom: 8px;
            margin-right: 8px;
            rotate: -45deg;
        }

        .player .circ {
            width: 25px;
            height: 25px;
            background-color: #F3DEBA;
            border-radius: 100%;
            z-index: 1;
        }

        .player .rect {
            width: 10px;
            height: 55px;
            background-color: #F3DEBA;
            position: absolute;
            bottom: 0;
            margin-bottom: 5px;
        }

        /* 翻转卡片组件 */
        .wrapper {
            --input-focus: #2d8cf0;
            --font-color: #323232;
            --font-color-sub: #666;
            --bg-color: #fff;
            --bg-color-alt: #666;
            --main-color: #323232;
        }
        .switch {
            transform: translateY(-200px);
            position: relative;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            gap: 30px;
            width: 50px;
            height: 20px;
        }
        .card-side::before {
            position: absolute;
            content: '用户登录';
            left: -70px;
            top: 0;
            width: 100px;
            text-decoration: underline;
            color: var(--font-color);
            font-weight: 600;
        }
        .card-side::after {
            position: absolute;
            content: '用户注册';
            left: 70px;
            top: 0;
            width: 100px;
            text-decoration: none;
            color: var(--font-color);
            font-weight: 600;
        }
        .toggle {
            opacity: 0;
            width: 0;
            height: 0;
        }
        .slider {
            box-sizing: border-box;
            border-radius: 5px;
            border: 2px solid var(--main-color);
            box-shadow: 4px 4px var(--main-color);
            position: absolute;
            cursor: pointer;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: var(--bg-color);
            transition: 0.3s;
        }
        .slider:before {
            box-sizing: border-box;
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            border: 2px solid var(--main-color);
            border-radius: 5px;
            left: -2px;
            bottom: 2px;
            background-color: var(--bg-color);
            box-shadow: 0 3px 0 var(--main-color);
            transition: 0.3s;
        }
        .toggle:checked + .slider {
            background-color: var(--input-focus);
        }
        .toggle:checked + .slider:before {
            transform: translateX(30px);
        }
        .toggle:checked ~ .card-side:before {
            text-decoration: none;
        }
        .toggle:checked ~ .card-side:after {
            text-decoration: underline;
        }
        .flip-card__inner {
            width: 300px;
            height: 350px;
            position: relative;
            background-color: transparent;
            perspective: 1000px;
            text-align: center;
            transition: transform 0.8s;
            transform-style: preserve-3d;
        }
        .toggle:checked ~ .flip-card__inner {
            transform: rotateY(180deg);
        }
        .toggle:checked ~ .flip-card__front {
            box-shadow: none;
        }
        .flip-card__front, .flip-card__back {
            padding: 20px;
            position: absolute;
            display: flex;
            flex-direction: column;
            justify-content: center;
            -webkit-backface-visibility: hidden;
            backface-visibility: hidden;
            background: lightgrey;
            gap: 20px;
            border-radius: 5px;
            border: 2px solid var(--main-color);
            box-shadow: 4px 4px var(--main-color);
        }
        .flip-card__back {
            width: 100%;
            transform: rotateY(180deg);
        }
        .flip-card__form {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 20px;
        }
        .title {
            margin: 20px 0 20px 0;
            font-size: 25px;
            font-weight: 900;
            text-align: center;
            color: var(--main-color);
        }
        .flip-card__input {
            width: 250px;
            height: 40px;
            border-radius: 5px;
            border: 2px solid var(--main-color);
            background-color: var(--bg-color);
            box-shadow: 4px 4px var(--main-color);
            font-size: 15px;
            font-weight: 600;
            color: var(--font-color);
            padding: 5px 10px;
            outline: none;
        }
        .flip-card__input::placeholder {
            color: var(--font-color-sub);
            opacity: 0.8;
        }
        .flip-card__input:focus {
            border: 2px solid var(--input-focus);
        }
        .flip-card__btn:active, .button-confirm:active {
            box-shadow: 0px 0px var(--main-color);
            transform: translate(3px, 3px);
        }
        .flip-card__btn {
            margin: 20px 0 20px 0;
            width: 120px;
            height: 40px;
            border-radius: 5px;
            border: 2px solid var(--main-color);
            background-color: var(--bg-color);
            box-shadow: 4px 4px var(--main-color);
            font-size: 17px;
            font-weight: 600;
            color: var(--font-color);
            cursor: pointer;
        }
    </style>
</head>

<body>

<!-- 音符掉落容器 -->
<div class="notes" id="notes"></div>

<!-- 右上角黑胶唱片 点击切换暗黑模式 -->
<div class="container" onclick="toggleDarkMode()">
    <div class="plate">
        <div class="black">
            <div class="border">
                <div class="white">
                    <div class="center"></div>
                </div>
            </div>
        </div>
    </div>
    <div class="player">
        <div class="rect"></div>
        <div class="circ"></div>
    </div>
</div>

<!-- 登录注册翻转卡片 -->
<div class="wrapper">
    <div class="card-switch">
        <label class="switch">
           <input type="checkbox" class="toggle">
           <span class="slider"></span>
           <span class="card-side"></span>
           <div class="flip-card__inner">
              <div class="flip-card__front">
                 <div class="title">用户登录</div>
                 <form class="flip-card__form" action="" onsubmit="login(); return false;">
                    <input class="flip-card__input" id="username" placeholder="请输入用户名" type="text">
                    <input class="flip-card__input" id="password" placeholder="请输入密码" type="password">
                    <button class="flip-card__btn">登录</button>
                 </form>
              </div>
              <div class="flip-card__back">
                 <div class="title">用户注册</div>
                 <form class="flip-card__form" action="" onsubmit="doRegister(); return false;">
                    <input class="flip-card__input" id="reg-username" placeholder="请输入用户名" type="text">
                    <input class="flip-card__input" id="reg-password" placeholder="请输入密码" type="password">
                    <button class="flip-card__btn">确认</button>
                 </form>
              </div>
           </div>
        </label>
    </div>   
</div>

<script>
    // ====================== 音符随机掉落 ======================
    function createNotes() {
        const notesContainer = document.getElementById('notes');
        const notes = ['♪', '♫', '♩', '♬'];
        
        // 生成间隔变慢 → 数量减半
        setInterval(() => {
            const note = document.createElement('div');
            note.classList.add('note');
            note.innerText = notes[Math.floor(Math.random() * notes.length)];
            
            // 随机水平位置
            note.style.left = Math.random() * 100 + 'vw';
            // 速度变慢一倍
            note.style.animationDuration = (Math.random() * 4 + 8) + 's';
            
            notesContainer.appendChild(note);
            
            setTimeout(() => note.remove(), 10000);
        }, 1200);
    }

    // 暗黑模式切换
    function toggleDarkMode() {
        document.body.classList.toggle('dark');
    }

    // 登录逻辑
    function login() {
        const username = document.getElementById('username').value.trim();
        const password = document.getElementById('password').value.trim();

        if (!username || !password) {
            alert('请输入用户名和密码');
            return;
        }

        fetch('/api/login', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        })
        .then(res => res.json())
        .then(data => {
            if (data.code === 0) {
                localStorage.setItem('token', data.data.token);
                localStorage.setItem('username', data.data.username);
                localStorage.setItem('role', data.data.role);
                localStorage.setItem('avatar', data.data.avatar);  // 新增：存储头像
                alert('登录成功');
                if (data.data.role === 'super_admin') {
                    location.href = 'admin.html';
                } else {
                    location.href = 'main.html';
                }
            } else {
                alert('登录失败：' + data.message);
            }
        })
        .catch(err => {
            alert('网络异常');
        });
    }

    // 注册逻辑
    function doRegister() {
        const username = document.getElementById('reg-username').value.trim();
        const password = document.getElementById('reg-password').value.trim();

        if (!username || !password) {
            alert('请输入用户名和密码');
            return;
        }

        fetch('/api/register', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ username, password })
        })
        .then(res => res.json())
        .then(data => {
            if (data.code === 0) {
                alert('注册成功，请登录');
                document.querySelector('.toggle').checked = false;
            } else {
                alert('注册失败：' + data.message);
            }
        })
        .catch(err => {
            alert('网络异常');
        });
    }

    // 回车登录
    document.addEventListener('DOMContentLoaded', () => {
        document.getElementById('username').addEventListener('keydown', e => {
            if (e.key === 'Enter') document.getElementById('password').focus();
        });
        document.getElementById('password').addEventListener('keydown', e => {
            if (e.key === 'Enter') login();
        });

        // 启动音符掉落
        createNotes();
    });
</script>

</body>
</html>
