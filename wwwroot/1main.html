<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 音乐生成器 · 霓虹乐章</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: 'Segoe UI', 'Inter', system-ui, sans-serif;
            background: radial-gradient(circle at 10% 20%, #0b0f1c, #03050b);
            min-height: 100vh;
            color: #f0f3fa;
            padding: 2rem;
            line-height: 1.5;
        }
        .container {
            max-width: 1300px;
            margin: 0 auto;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid rgba(100, 210, 255, 0.2);
            backdrop-filter: blur(10px);
        }
        .logo h1 {
            font-size: 2.2rem;
            font-weight: 700;
            background: linear-gradient(135deg, #a5f3fc, #c084fc, #f472b6);
            -webkit-background-clip: text;
            background-clip: text;
            color: transparent;
            letter-spacing: -0.5px;
            text-shadow: 0 0 20px rgba(168, 85, 247, 0.3);
        }
        .user-info {
            display: flex;
            align-items: center;
            gap: 1.5rem;
            background: rgba(20, 30, 45, 0.6);
            padding: 0.5rem 1rem 0.5rem 1.5rem;
            border-radius: 40px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.08);
        }
        .username {
            font-weight: 600;
            color: #e0e7ff;
        }
        .logout-btn {
            background: rgba(220, 38, 38, 0.8);
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 30px;
            color: white;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s ease;
            backdrop-filter: blur(5px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .logout-btn:hover {
            background: #b91c1c;
            transform: translateY(-2px);
            box-shadow: 0 10px 20px -5px rgba(220, 38, 38, 0.4);
        }
        .card {
            background: rgba(18, 28, 46, 0.7);
            backdrop-filter: blur(12px);
            border-radius: 28px;
            padding: 1.8rem;
            margin-bottom: 2rem;
            box-shadow: 0 25px 40px -15px rgba(0, 0, 0, 0.6), 0 0 0 1px rgba(120, 180, 255, 0.1) inset;
            border: 1px solid rgba(255, 255, 255, 0.05);
            transition: transform 0.2s ease;
        }
        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 30px 50px -15px #00000080, 0 0 0 1px #7aaaff33 inset;
        }
        .card-title {
            font-size: 1.5rem;
            margin-bottom: 1.5rem;
            display: flex;
            align-items: center;
            gap: 0.6rem;
            color: #b6d9ff;
            font-weight: 600;
            letter-spacing: -0.3px;
        }
        .file-input {
            margin-bottom: 1.5rem;
        }
        .file-input label {
            display: block;
            margin-bottom: 0.5rem;
            font-weight: 500;
            color: #b0c8e5;
            font-size: 0.95rem;
        }
        input[type="file"] {
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(10, 20, 35, 0.8);
            border: 1.5px dashed #3b4e6b;
            border-radius: 18px;
            color: #dfe7f5;
            cursor: pointer;
            transition: border 0.2s;
            font-size: 0.9rem;
        }
        input[type="file"]:hover {
            border-color: #7c9bda;
            background: rgba(20, 35, 55, 0.9);
        }
        input[type="file"]::file-selector-button {
            background: linear-gradient(145deg, #4f6f9f, #2e4a7a);
            border: none;
            padding: 0.5rem 1.2rem;
            border-radius: 30px;
            color: white;
            font-weight: 500;
            cursor: pointer;
            margin-right: 1.2rem;
            transition: 0.15s;
            border: 1px solid #8aabee33;
        }
        input[type="file"]::file-selector-button:hover {
            background: linear-gradient(145deg, #6080b0, #3f5f90);
            box-shadow: 0 0 10px #5f9eff66;
        }
        .btn-generate {
            background: linear-gradient(145deg, #8b5cf6, #6d28d9);
            color: white;
            border: none;
            padding: 1rem 1.8rem;
            font-size: 1.1rem;
            border-radius: 50px;
            cursor: pointer;
            width: 100%;
            font-weight: 600;
            transition: all 0.2s;
            margin-top: 0.8rem;
            box-shadow: 0 8px 20px -8px #8b5cf6;
            border: 1px solid #c4b5fd55;
            letter-spacing: 0.5px;
        }
        .btn-generate:hover {
            background: linear-gradient(145deg, #9d6eff, #7c3aed);
            transform: scale(1.01) translateY(-2px);
            box-shadow: 0 15px 25px -8px #a78bfa;
        }
        .btn-generate:disabled {
            background: #334155;
            box-shadow: none;
            transform: none;
            cursor: not-allowed;
            opacity: 0.6;
        }
        .result-area {
            background: rgba(0, 0, 0, 0.25);
            border-radius: 22px;
            padding: 1.2rem;
            margin-top: 1.8rem;
            text-align: center;
            backdrop-filter: blur(8px);
            border: 1px solid #3f4e6b;
        }
        .loading {
            display: inline-block;
            width: 22px;
            height: 22px;
            border: 3px solid #a5b4cb;
            border-top-color: #c084fc;
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin-right: 0.6rem;
            vertical-align: middle;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        audio {
            width: 100%;
            margin: 1.2rem 0 0.5rem;
            border-radius: 30px;
            background: #0f1a2b;
        }
        .download-link {
            display: inline-block;
            background: #3b82f6;
            color: white;
            padding: 0.6rem 1.4rem;
            border-radius: 40px;
            text-decoration: none;
            margin-top: 0.8rem;
            font-weight: 500;
            transition: background 0.2s;
        }
        .download-link:hover {
            background: #2563eb;
        }
        .error-message {
            color: #fca5a5;
            background: #2d1a1e;
            padding: 0.9rem;
            border-radius: 20px;
            border-left: 5px solid #f87171;
        }
        .history-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95rem;
        }
        .history-table th {
            text-align: left;
            padding: 1rem 0.5rem 0.8rem 0.5rem;
            color: #a5d8ff;
            font-weight: 600;
            border-bottom: 2px solid #2e405b;
        }
        .history-table td {
            padding: 0.9rem 0.5rem;
            border-bottom: 1px solid #25344a;
            color: #d6e3f5;
        }
        .history-audio audio {
            width: 150px;
            height: 32px;
            background: transparent;
        }
        .pagination {
            display: flex;
            justify-content: center;
            gap: 1.5rem;
            margin-top: 2rem;
        }
        .page-btn {
            background: #1e2e45;
            border: 1px solid #4b6382;
            padding: 0.5rem 1.2rem;
            border-radius: 30px;
            color: #e0edff;
            font-weight: 500;
            cursor: pointer;
            transition: 0.15s;
        }
        .page-btn:hover {
            background: #2f4870;
            border-color: #90b4f0;
        }
        .two-columns {
            display: grid;
            grid-template-columns: 1.1fr 1.9fr;
            gap: 2rem;
        }
        @media (max-width: 800px) {
            .two-columns {
                grid-template-columns: 1fr;
            }
            body {
                padding: 1.2rem;
            }
            .header {
                flex-direction: column;
                align-items: start;
                gap: 1rem;
            }
        }
        .badge {
            background: #2e3f5e;
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            font-size: 0.8rem;
            color: #bdd3ff;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="header">
        <div class="logo">
            <h1>🎵 霓虹乐章 · AI 音乐生成</h1>
        </div>
        <div class="user-info">
            <span class="username" id="usernameDisplay"></span>
            <button class="logout-btn" id="logoutBtn">🚪 退出登录</button>
        </div>
    </div>

    <div class="two-columns">
        <!-- 左侧：上传区域 -->
        <div class="card">
            <div class="card-title"><span>✨</span> 创作新音乐</div>
            <div class="file-input">
                <label>🎼 目标 MIDI 文件 <span style="color:#ff8787">*</span></label>
                <input type="file" id="midiFile" accept=".mid,.midi">
            </div>
            <div class="file-input">
                <label>🎹 参考 MIDI 文件 <span style="color:#ff8787">*</span></label>
                <input type="file" id="refMidiFile" accept=".mid,.midi">
            </div>
            <div class="file-input">
                <label>🎤 参考音频 <span class="badge">必选 · WAV</span></label>
                <input type="file" id="refAudioFile" accept=".wav">
            </div>
            <button class="btn-generate" id="generateBtn">✨ 生成音乐</button>
            <div id="taskStatus" class="result-area" style="display: none;">
                <div id="statusMessage"></div>
                <div id="audioResult"></div>
            </div>
        </div>

        <!-- 右侧：历史记录 -->
        <div class="card">
            <div class="card-title"><span>📜</span> 我的作品集</div>
            <div id="historyContainer">
                <div style="text-align: center; padding: 2.5rem; color: #8899bb;">✨ 加载中...</div>
            </div>
        </div>
    </div>
</div>

<script>
    (function() {
        "use strict";

        // ---------- 全局变量 ----------
        const token = localStorage.getItem('token');
        const username = localStorage.getItem('username');
        if (!token) {
            window.location.href = '/login.html';
            return;
        }
        document.getElementById('usernameDisplay').innerText = username || '音乐家';

        let activePollingTaskId = null;
        let pollingInterval = null;
        let currentHistoryPage = 1;
        // 缓存最近一次分页返回的任务列表（用于决策下一个轮询任务）
        let cachedTasks = [];

        const midiFileInput = document.getElementById('midiFile');
        const refMidiFileInput = document.getElementById('refMidiFile');
        const refAudioFileInput = document.getElementById('refAudioFile');
        const generateBtn = document.getElementById('generateBtn');
        const taskStatusDiv = document.getElementById('taskStatus');
        const statusMessageSpan = document.getElementById('statusMessage');
        const audioResultDiv = document.getElementById('audioResult');

        console.log('[Init] 元素绑定成功');

        // ---------- 辅助函数：带认证的 fetch ----------
        async function authFetch(url, options = {}) {
            const headers = {
                'Authorization': `Bearer ${token}`,
                ...options.headers
            };
            console.log(`[authFetch] ${options.method || 'GET'} ${url}`);
            const response = await fetch(url, { ...options, headers });
            console.log(`[authFetch] 响应状态: ${response.status}`);
            if (!response.ok) {
                const text = await response.text();
                console.error('[authFetch] 错误响应:', text);
                throw new Error(`HTTP ${response.status}: ${text}`);
            }
            const data = await response.json();
            console.log(`[authFetch] 响应数据:`, data);
            return data;
        }

        // ---------- 停止轮询 ----------
        function stopPolling() {
            if (pollingInterval) {
                clearInterval(pollingInterval);
                pollingInterval = null;
                console.log('[Polling] 已停止');
            }
            activePollingTaskId = null;
        }

        // ---------- 从缓存任务中找出最早未完成任务，若与当前轮询不同则切换 ----------
        function checkAndSwitchToEarliestPending() {
            const pendingTasks = cachedTasks.filter(t => t.status === 'pending' || t.status === 'processing');
            if (pendingTasks.length === 0) {
                stopPolling();
                console.log('[Polling] 没有未完成任务');
                return;
            }

            pendingTasks.sort((a, b) => new Date(a.created_at) - new Date(b.created_at));
            const earliestTask = pendingTasks[0];
            const taskId = earliestTask.task_id;

            if (activePollingTaskId !== taskId) {
                console.log(`[Polling] 切换到最早未完成任务: ${taskId} (创建于 ${earliestTask.created_at})`);
                startPollingForTask(taskId);
            } else {
                console.log('[Polling] 当前已轮询最早任务，无需切换');
            }
        }

        // ---------- 开始轮询指定任务 ----------
        function startPollingForTask(taskId) {
            stopPolling();
            activePollingTaskId = taskId;
            console.log(`[Polling] 开始轮询任务: ${taskId}`);

            taskStatusDiv.style.display = 'block';
            updateStatus('pending'); // 临时显示

            pollingInterval = setInterval(async () => {
                try {
                    const data = await authFetch(`/api/tasks/status?task_id=${taskId}`);
                    const statusData = data.data;
                    const status = statusData.status;

                    updateStatus(status);

                    // 仅当任务结束（完成或失败）时，才刷新分页列表
                    if (status === 'completed' || status === 'failed') {
                        stopPolling();
                        if (status === 'completed') {
                            showResult(statusData.audio_url);
                        } else {
                            showError(statusData.error_msg || '生成失败');
                        }
                        // 刷新列表以更新表格状态，并可能切换下一个任务
                        await loadHistory(currentHistoryPage);
                    }
                    // 注意：轮询过程中不刷新分页，减少服务器压力
                } catch (err) {
                    console.error('[Polling] 请求异常:', err);
                    stopPolling();
                    showError('网络错误或服务器异常');
                }
            }, 2000);
        }

        // ---------- 提交任务 ----------
        async function submitTask(midiFile, refMidiFile, audioFile) {
            const formData = new FormData();
            formData.append('midi', midiFile);
            formData.append('ref_midi', refMidiFile);
            formData.append('audio', audioFile);

            console.log('[Submit] 准备提交:', {
                midi: midiFile.name,
                ref_midi: refMidiFile.name,
                audio: audioFile.name
            });

            const data = await authFetch('/api/tasks', {
                method: 'POST',
                body: formData
            });
            if (data.code === 0) {
                return data.data.task_id;
            } else {
                throw new Error(data.message || '提交任务失败');
            }
        }

        // ---------- UI 更新 ----------
        function updateStatus(status) {
            taskStatusDiv.style.display = 'block';
            let statusText = '';
            if (status === 'pending') statusText = '⏳ 任务排队中...';
            else if (status === 'processing') statusText = '🎶 AI 正在创作音乐，请稍候...';
            else statusText = `状态: ${status}`;
            statusMessageSpan.innerHTML = `<span class="loading"></span> ${statusText}`;
            audioResultDiv.innerHTML = '';
        }

        function showResult(audioUrl) {
            taskStatusDiv.style.display = 'block';
            statusMessageSpan.innerHTML = '✅ 生成完成！';
            audioResultDiv.innerHTML = `
                <audio controls autoplay>
                    <source src="${audioUrl}" type="audio/wav">
                    您的浏览器不支持音频播放。
                </audio>
                <br>
                <a href="${audioUrl}" download class="download-link">⬇️ 下载音频文件</a>
            `;
        }

        function showError(errorMsg) {
            taskStatusDiv.style.display = 'block';
            statusMessageSpan.innerHTML = '';
            audioResultDiv.innerHTML = `<div class="error-message">❌ 生成失败: ${errorMsg}</div>`;
        }

        function enableGenerateButton() {
            generateBtn.disabled = false;
            generateBtn.textContent = '✨ 生成音乐';
            console.log('[UI] 生成按钮已启用');
        }

        function disableGenerateButton(text = '提交中...') {
            generateBtn.disabled = true;
            generateBtn.textContent = text;
            console.log('[UI] 生成按钮已禁用');
        }

        // ---------- 生成按钮点击事件 ----------
        generateBtn.addEventListener('click', async function(event) {
            event.preventDefault();
            console.log('[Click] 生成按钮被点击');

            const midiFile = midiFileInput.files[0];
            const refMidiFile = refMidiFileInput.files[0];
            const audioFile = refAudioFileInput.files[0];

            if (!midiFile) {
                alert('请选择目标 MIDI 文件');
                return;
            }
            if (!refMidiFile) {
                alert('请选择参考 MIDI 文件');
                return;
            }
            if (!audioFile) {
                alert('请选择参考音频文件 (WAV)');
                return;
            }

            disableGenerateButton('提交中...');
            try {
                const taskId = await submitTask(midiFile, refMidiFile, audioFile);
                console.log('[Submit] 任务提交成功, taskId=', taskId);
                // 提交成功后刷新分页列表，显示新任务，并自动开始轮询最早未完成任务
                await loadHistory(currentHistoryPage);
            } catch (err) {
                console.error('[Submit] 提交失败:', err);
                showError(err.message);
            } finally {
                enableGenerateButton();
            }
        });

        console.log('[Event] 生成按钮事件已绑定');

        // ---------- 退出登录 ----------
        document.getElementById('logoutBtn').addEventListener('click', () => {
            localStorage.removeItem('token');
            localStorage.removeItem('username');
            window.location.href = '/login.html';
        });

        // ---------- 加载历史记录并渲染（仅在特定时机调用）----------
        async function loadHistory(page = 1) {
            currentHistoryPage = page;
            const historyContainer = document.getElementById('historyContainer');
            try {
                const data = await authFetch(`/api/tasks?page=${page}&limit=10`);
                if (data.code === 0 && data.data && data.data.list) {
                    const tasks = data.data.list;
                    const total = data.data.total;
                    const currentPage = data.data.page;
                    const limit = data.data.limit;

                    // 缓存任务列表
                    cachedTasks = tasks;

                    if (tasks.length === 0) {
                        historyContainer.innerHTML = '<div style="text-align: center; padding: 2.5rem; color: #8899bb;">🎼 暂无历史记录，快去创作吧！</div>';
                        stopPolling();
                        return;
                    }

                    let html = '<table class="history-table"><thead><tr><th>任务ID</th><th>状态</th><th>音频</th><th>创建时间</th></tr></thead><tbody>';
                    for (const task of tasks) {
                        const statusText = task.status === 'completed' ? '✅ 已完成' :
                                          (task.status === 'pending' ? '⏳ 等待中' :
                                          (task.status === 'processing' ? '🎶 处理中' : '❌ 失败'));
                        const audioHtml = task.audio_url ? `<audio controls src="${task.audio_url}"></audio>` : '—';
                        html += `<tr>
                            <td>${task.task_id.substring(0, 10)}…</td>
                            <td>${statusText}</td>
                            <td class="history-audio">${audioHtml}</td>
                            <td>${new Date(task.created_at).toLocaleString()}</td>
                        </tr>`;
                    }
                    html += '</tbody></table>';

                    const totalPages = Math.ceil(total / limit);
                    let paginationHtml = '<div class="pagination">';
                    if (currentPage > 1) {
                        paginationHtml += `<button class="page-btn" data-page="${currentPage-1}">← 上一页</button>`;
                    }
                    paginationHtml += `<span style="margin: 0 1rem; align-self: center;">第 ${currentPage} / ${totalPages} 页</span>`;
                    if (currentPage < totalPages) {
                        paginationHtml += `<button class="page-btn" data-page="${currentPage+1}">下一页 →</button>`;
                    }
                    paginationHtml += '</div>';

                    historyContainer.innerHTML = html + paginationHtml;

                    document.querySelectorAll('.page-btn').forEach(btn => {
                        btn.addEventListener('click', (e) => {
                            const newPage = parseInt(btn.dataset.page);
                            loadHistory(newPage);
                        });
                    });

                    // 刷新列表后，检查是否需要开始/切换轮询（基于最新的缓存任务）
                    checkAndSwitchToEarliestPending();
                } else {
                    historyContainer.innerHTML = '<div style="text-align: center; padding: 2rem; color: #94a3b8;">加载历史记录失败</div>';
                }
            } catch (err) {
                console.error('[LoadHistory] 错误:', err);
                historyContainer.innerHTML = '<div style="text-align: center; padding: 2rem; color: #f87171;">加载失败，请检查网络</div>';
            }
        }

        // 页面可见性变化时暂停/恢复轮询
        document.addEventListener('visibilitychange', () => {
            if (document.hidden) {
                if (pollingInterval) {
                    clearInterval(pollingInterval);
                    pollingInterval = null;
                    console.log('[Polling] 页面隐藏，暂停轮询');
                }
            } else {
                if (activePollingTaskId && !pollingInterval) {
                    console.log('[Polling] 页面可见，恢复轮询');
                    startPollingForTask(activePollingTaskId);
                }
            }
        });

        // 初始化：登录后只进行一次分页请求
        loadHistory();
    })();
</script>
</body>
</html>
